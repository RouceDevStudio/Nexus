[setup]
pkgs = ["nodejs_22", "python311", "python311Packages.pip"]

[install]
cmds = [
"rm -f package-lock.json",
"npm install --legacy-peer-deps",
"python3 -m pip install -r requirements.txt",
# Verificar que Python y Pip estén disponibles durante la instalación
"which python3 && python3 --version",
"which pip && pip --version"
]

[start]
cmd = "bash start.sh"
